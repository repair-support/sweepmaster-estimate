<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スイープマスター 料金表設定</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6f8; color: #1f2937; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; }
    main { width: min(100%, 680px); margin: 0 auto; padding: 28px; border-radius: 18px; background: #fff; box-shadow: 0 10px 30px rgba(15, 23, 42, .08); }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p, li { color: #475569; font-size: 14px; line-height: 1.8; }
    label { display: block; margin-top: 22px; font-size: 14px; font-weight: 700; }
    input { width: 100%; margin-top: 8px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; }
    button, .button { display: inline-block; margin-top: 14px; padding: 11px 16px; border: 0; border-radius: 9px; background: #1d4ed8; color: #fff; cursor: pointer; font-size: 14px; font-weight: 700; text-decoration: none; }
    .secondary { background: #64748b; }
    #message { min-height: 24px; color: #166534; font-weight: 700; }
    code { padding: 2px 4px; border-radius: 4px; background: #f1f5f9; }
  </style>
</head>
<body>
  <main>
    <h1>料金表の設定</h1>
    <p>GoogleスプレッドシートをCSV形式で公開すると、料金をスプレッドシートから管理できます。見積り画面は起動時と60秒ごとに最新版を読み込みます。</p>
    <ol>
      <li><a href="template.html">料金表テンプレート作成画面</a>でデータをコピーし、GoogleスプレッドシートのA1セルへ貼り付けます。</li>
      <li>列名を変えず、必要な料金行を追加します。</li>
      <li>Googleスプレッドシートの「ファイル」→「共有」→「ウェブに公開」で、対象シートをCSVとして公開します。</li>
      <li>発行されたCSV URLを下に貼り付けます。</li>
    </ol>
    <p><code>種別</code> には <code>症状</code> または <code>エラーコード</code> を入力してください。</p>

    <label for="sheetUrl">公開CSV URL</label>
    <input id="sheetUrl" type="url" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv">
    <button type="button" id="saveButton">このブラウザに保存</button>
    <button type="button" class="secondary" id="clearButton">設定を解除</button>
    <p id="message"></p>
    <a class="button" href="index.html">見積り画面へ戻る</a>
  </main>

  <script src="config.js"></script>
  <script>
    const input = document.querySelector("#sheetUrl");
    const message = document.querySelector("#message");
    input.value = localStorage.getItem("sweepmasterSheetCsvUrl") || window.SWEEPMASTER_CONFIG?.sheetCsvUrl || "";

    document.querySelector("#saveButton").addEventListener("click", () => {
      const url = input.value.trim();
      if (!url) {
        message.textContent = "CSV URLを入力してください。";
        return;
      }
      localStorage.setItem("sweepmasterSheetCsvUrl", url);
      message.textContent = "保存しました。見積り画面を再読み込みすると反映されます。";
    });

    document.querySelector("#clearButton").addEventListener("click", () => {
      localStorage.removeItem("sweepmasterSheetCsvUrl");
      input.value = window.SWEEPMASTER_CONFIG?.sheetCsvUrl || "";
      message.textContent = "このブラウザの設定を解除しました。";
    });
  </script>
</body>
</html>
